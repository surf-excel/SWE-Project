<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Donation detail')}"></head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-1">
    <div th:replace="~{fragments/layout :: flash}"></div>
    <div class="max-w-3xl mx-auto px-4 py-8 space-y-6">
        <a th:href="@{/restaurant}" class="text-sm text-slate-500 hover:text-slate-700">&larr; Back to dashboard</a>

        <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden">
            <img th:if="${donation.imagePath}" th:src="${donation.imagePath}" alt="Food" class="w-full h-64 object-cover"/>
            <div class="p-6">
            <div class="flex items-start justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900" th:text="${donation.foodItemName}"></h1>
                    <p class="text-slate-500" th:text="${donation.quantity}"></p>
                </div>
                <span class="px-2 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-700"
                      th:text="${donation.status}"></span>
            </div>
            <div class="mt-4 grid grid-cols-2 gap-4 text-sm">
                <div>
                    <div class="text-slate-500 text-xs uppercase">Pickup deadline</div>
                    <div th:text="${#temporals.format(donation.pickupDeadline, 'yyyy-MM-dd HH:mm')}"></div>
                </div>
                <div>
                    <div class="text-slate-500 text-xs uppercase">Posted</div>
                    <div th:text="${#temporals.format(donation.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                </div>
                <div class="col-span-2" th:if="${donation.specialInstructions}">
                    <div class="text-slate-500 text-xs uppercase">Special instructions</div>
                    <div th:text="${donation.specialInstructions}"></div>
                </div>
            </div>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-6">
            <h2 class="text-lg font-semibold text-slate-900">Claims</h2>
            <div th:if="${claims.empty}" class="text-sm text-slate-500 mt-3">No claims yet.</div>
            <ul class="mt-3 divide-y divide-slate-100">
                <li th:each="c : ${claims}" class="py-3 flex items-center justify-between">
                    <div>
                        <div class="font-medium" th:text="${c.orphanage.fullName}"></div>
                        <div class="text-xs text-slate-500">
                            <span th:text="${c.orphanage.phoneNumber}"></span>
                            &middot; <span th:text="${c.orphanage.address}"></span>
                        </div>
                        <div class="text-xs text-slate-400 mt-1">
                            Status: <span th:text="${c.status}"></span> &middot;
                            <span th:text="${#temporals.format(c.claimedAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                    </div>
                    <form th:if="${c.status.name() == 'PENDING'}"
                          th:action="@{'/restaurant/claims/' + ${c.claimId} + '/picked-up'}" method="post">
                        <button class="px-3 py-1.5 rounded-md bg-brand-600 text-white text-sm font-semibold hover:bg-brand-700">
                            Mark picked up
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
