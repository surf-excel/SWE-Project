<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Restaurant dashboard')}"></head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-1">
    <div th:replace="~{fragments/layout :: flash}"></div>
    <div class="max-w-6xl mx-auto px-4 py-8 space-y-8 animate-fade-in-up">

        <div class="relative overflow-hidden rounded-2xl bg-gradient-to-br from-brand-600 via-brand-700 to-emerald-700 text-white p-6 md:p-8 shadow-soft">
            <div class="absolute -top-12 -right-12 w-56 h-56 rounded-full bg-white/10 blur-2xl"></div>
            <div class="absolute -bottom-16 -left-10 w-64 h-64 rounded-full bg-emerald-300/20 blur-3xl"></div>
            <div class="relative flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                <div>
                    <div class="text-brand-100 text-xs uppercase tracking-wider font-bold">Restaurant dashboard</div>
                    <h1 class="text-2xl md:text-3xl font-extrabold mt-1">Hello, <span th:text="${user.fullName}"></span> 👋</h1>
                    <p class="text-brand-100 mt-1 text-sm">Your donations &mdash; recent first.</p>
                </div>
                <a th:href="@{/restaurant/donations/new}"
                   class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-white text-brand-700 font-bold hover:bg-brand-50 shadow-soft transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Post donation
                </a>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-4">
            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-soft hover:-translate-y-0.5 transition">
                <div class="flex items-center justify-between">
                    <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Total posts</div>
                    <span class="inline-flex w-9 h-9 rounded-lg bg-brand-100 text-brand-700 items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    </span>
                </div>
                <div class="text-3xl font-extrabold text-slate-900 mt-2" th:text="${donations.size()}"></div>
            </div>
            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-soft hover:-translate-y-0.5 transition">
                <div class="flex items-center justify-between">
                    <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Unread notifications</div>
                    <span class="inline-flex w-9 h-9 rounded-lg bg-amber-100 text-amber-700 items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    </span>
                </div>
                <div class="text-3xl font-extrabold text-slate-900 mt-2" th:text="${unread}"></div>
            </div>
            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-soft hover:-translate-y-0.5 transition">
                <div class="flex items-center justify-between">
                    <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Account</div>
                    <span class="inline-flex w-9 h-9 rounded-lg bg-sky-100 text-sky-700 items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                </div>
                <div class="text-sm font-semibold text-slate-800 mt-2 truncate" th:text="${user.email}"></div>
                <div class="text-xs text-slate-500" th:text="${user.phoneNumber}"></div>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-soft">
            <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
                <h2 class="font-semibold text-slate-900">Recent donations</h2>
                <span class="text-xs text-slate-500" th:text="${donations.size()} + ' total'"></span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="text-left px-5 py-3">Food item</th>
                            <th class="text-left px-5 py-3">Quantity</th>
                            <th class="text-left px-5 py-3">Pickup deadline</th>
                            <th class="text-left px-5 py-3">Status</th>
                            <th class="text-right px-5 py-3"></th>
                        </tr>
                    </thead>
                    <tbody>
                    <tr th:each="d : ${donations}" class="border-t border-slate-100 hover:bg-slate-50/60 transition">
                        <td class="px-5 py-3.5 font-semibold text-slate-900">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg bg-slate-100 overflow-hidden flex items-center justify-center flex-shrink-0">
                                    <img th:if="${d.imagePath}" th:src="${d.imagePath}" alt="" class="w-full h-full object-cover"/>
                                    <svg th:unless="${d.imagePath}" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                </div>
                                <span th:text="${d.foodItemName}"></span>
                            </div>
                        </td>
                        <td class="px-5 py-3.5 text-slate-600" th:text="${d.quantity}"></td>
                        <td class="px-5 py-3.5 text-slate-600" th:text="${#temporals.format(d.pickupDeadline, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="px-5 py-3.5">
                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold"
                                  th:classappend="${d.status.name() == 'AVAILABLE'} ? 'bg-brand-100 text-brand-700'
                                                : (${d.status.name() == 'CLAIMED'}   ? 'bg-amber-100 text-amber-700'
                                                : (${d.status.name() == 'PICKED_UP'} ? 'bg-slate-200 text-slate-700'
                                                : 'bg-red-100 text-red-700'))">
                                <span class="w-1.5 h-1.5 rounded-full"
                                      th:classappend="${d.status.name() == 'AVAILABLE'} ? 'bg-brand-500'
                                                    : (${d.status.name() == 'CLAIMED'}   ? 'bg-amber-500'
                                                    : (${d.status.name() == 'PICKED_UP'} ? 'bg-slate-500'
                                                    : 'bg-red-500'))"></span>
                                <span th:text="${d.status}"></span>
                            </span>
                        </td>
                        <td class="px-5 py-3.5 text-right">
                            <a th:href="@{'/restaurant/donations/' + ${d.donationId}}"
                               class="inline-flex items-center gap-1 text-brand-700 hover:text-brand-800 hover:underline font-semibold text-sm">
                                View
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${donations.empty}">
                        <td colspan="5" class="px-5 py-14 text-center">
                            <div class="inline-flex w-12 h-12 rounded-full bg-slate-100 text-slate-400 items-center justify-center mb-3">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            </div>
                            <div class="text-slate-700 font-medium">No donations yet</div>
                            <div class="text-slate-500 text-xs mt-1">Click "Post donation" to share your first one.</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
