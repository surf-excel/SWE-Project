<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Notifications')}"></head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-1">
    <div th:replace="~{fragments/layout :: flash}"></div>
    <div class="max-w-3xl mx-auto px-4 py-8 space-y-4">
        <h1 class="text-2xl font-bold text-slate-900">Notifications</h1>
        <div class="bg-white border border-slate-200 rounded-2xl divide-y divide-slate-100">
            <div th:each="n : ${notifications}" class="p-4 flex items-start justify-between">
                <div>
                    <div class="text-sm font-medium text-slate-900" th:text="${n.message}"></div>
                    <div class="text-xs text-slate-500 mt-1">
                        <span th:text="${n.type}"></span> &middot;
                        <span th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                </div>
            </div>
            <div th:if="${notifications.empty}" class="p-10 text-center text-slate-500">
                You have no notifications.
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
