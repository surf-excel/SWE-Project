<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:fragment="head(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} ?: 'Food Waste Management'">Food Waste Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50:  '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        accent: {
                            500: '#f59e0b',
                            600: '#d97706',
                        }
                    },
                    boxShadow: {
                        'soft': '0 2px 8px -1px rgba(15, 23, 42, 0.04), 0 4px 16px -2px rgba(15, 23, 42, 0.06)',
                        'glow': '0 0 0 4px rgba(34, 197, 94, 0.12)',
                    },
                    keyframes: {
                        'fade-in-up': {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        'float': {
                            '0%,100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-6px)' },
                        }
                    },
                    animation: {
                        'fade-in-up': 'fade-in-up 0.45s ease-out both',
                        'float': 'float 4s ease-in-out infinite',
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        .glass {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(12px);
            -webkit-backdrop-filter: saturate(180%) blur(12px);
        }
        .grid-bg {
            background-image:
                radial-gradient(circle at 20% 10%, rgba(34,197,94,0.10), transparent 40%),
                radial-gradient(circle at 80% 0%,  rgba(16,185,129,0.08), transparent 45%);
        }
        .nav-link {
            position: relative;
            padding: 0.4rem 0.1rem;
            color: rgb(71 85 105);
            font-weight: 500;
            transition: color .15s ease;
        }
        .nav-link:hover { color: rgb(21 128 61); }
        .nav-link::after {
            content: '';
            position: absolute;
            left: 0; right: 0; bottom: -2px;
            height: 2px;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            border-radius: 2px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .2s ease;
        }
        .nav-link:hover::after { transform: scaleX(1); }
        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
            background-image: linear-gradient(135deg, #22c55e, #15803d);
            color: white; font-weight: 600;
            box-shadow: 0 8px 20px -8px rgba(22,163,74,0.55);
            transition: transform .15s ease, box-shadow .2s ease, filter .15s ease;
        }
        .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.05); box-shadow: 0 10px 24px -8px rgba(22,163,74,0.7); }
        .btn-primary:active { transform: translateY(0); }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="glass sticky top-0 z-40 border-b border-slate-200/70">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a th:href="@{/}" class="flex items-center gap-2.5 font-bold text-lg group">
            <span class="relative inline-flex w-9 h-9 items-center justify-center rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 text-white shadow-soft group-hover:shadow-glow transition-shadow">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2c-1.5 3-1.5 5 0 7"/>
                    <path d="M5 10c0 6 3 10 7 10s7-4 7-10c0-1-1-2-2-2H7c-1 0-2 1-2 2z"/>
                </svg>
            </span>
            <span class="bg-gradient-to-r from-brand-700 to-brand-500 bg-clip-text text-transparent">FoodWaste</span>
        </a>

        <button id="mobileMenuBtn" class="md:hidden inline-flex items-center justify-center w-9 h-9 rounded-md text-slate-600 hover:bg-slate-100" aria-label="Toggle menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div id="mobileMenu" class="hidden md:flex items-center gap-5 text-sm absolute md:static top-full left-0 right-0 md:top-auto bg-white md:bg-transparent border-b md:border-0 border-slate-200 px-4 md:px-0 py-4 md:py-0 flex-col md:flex-row md:gap-5">
            <div sec:authorize="hasRole('RESTAURANT')" class="flex flex-col md:flex-row items-stretch md:items-center gap-2 md:gap-5 w-full md:w-auto">
                <a th:href="@{/restaurant}" class="nav-link">Dashboard</a>
                <a th:href="@{/restaurant/donations/new}" class="nav-link">Post donation</a>
                <a th:href="@{/restaurant/notifications}" class="nav-link">Notifications</a>
                <a th:href="@{/restaurant/history}" class="nav-link">History</a>
            </div>
            <div sec:authorize="hasRole('ORPHANAGE')" class="flex flex-col md:flex-row items-stretch md:items-center gap-2 md:gap-5 w-full md:w-auto">
                <a th:href="@{/orphanage}" class="nav-link">Available</a>
                <a th:href="@{/orphanage/notifications}" class="nav-link">Notifications</a>
                <a th:href="@{/orphanage/history}" class="nav-link">History</a>
                <a th:href="@{/orphanage/reports/new}" class="nav-link">Report</a>
            </div>
            <div sec:authorize="hasRole('ADMIN')" class="flex flex-col md:flex-row items-stretch md:items-center gap-2 md:gap-5 w-full md:w-auto">
                <a th:href="@{/admin}" class="nav-link">Admin</a>
                <a th:href="@{/admin/users}" class="nav-link">Users</a>
            </div>
            <div sec:authorize="hasAnyRole('RESTAURANT','ORPHANAGE')" class="md:pl-4 md:border-l md:border-slate-200">
                <a th:href="@{/profile}" class="nav-link inline-flex items-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Profile
                </a>
            </div>
            <div sec:authorize="isAuthenticated()" class="flex items-center gap-3">
                <div class="flex items-center gap-2 text-slate-700">
                    <a sec:authorize="hasAnyRole('RESTAURANT','ORPHANAGE')" th:href="@{/profile}" class="inline-flex w-7 h-7 items-center justify-center rounded-full bg-brand-100 text-brand-700 text-xs font-bold overflow-hidden hover:ring-2 hover:ring-brand-300 transition" sec:authentication="name" th:text="${#strings.toUpperCase(#strings.substring(#authentication.name,0,1))}"></a>
                    <span sec:authorize="hasRole('ADMIN')" class="inline-flex w-7 h-7 items-center justify-center rounded-full bg-brand-100 text-brand-700 text-xs font-bold" sec:authentication="name" th:text="${#strings.toUpperCase(#strings.substring(#authentication.name,0,1))}"></span>
                    <span class="text-slate-600 text-xs hidden lg:inline" sec:authentication="name"></span>
                </div>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button class="px-3 py-1.5 rounded-md bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium transition">
                        Log out
                    </button>
                </form>
            </div>
            <div sec:authorize="!isAuthenticated()" class="flex items-center gap-2">
                <a th:href="@{/login}" class="px-3 py-1.5 rounded-md text-slate-700 hover:bg-slate-100 font-medium">Log in</a>
                <a th:href="@{/register}" class="px-4 py-1.5 rounded-md btn-primary text-sm">Sign up</a>
            </div>
        </div>
    </div>
    <script>
        (function(){
            const btn = document.getElementById('mobileMenuBtn');
            const menu = document.getElementById('mobileMenu');
            if (btn && menu) {
                btn.addEventListener('click', () => menu.classList.toggle('hidden'));
            }
        })();
    </script>
</nav>

<div th:fragment="flash" class="max-w-6xl mx-auto w-full px-4 pt-4">
    <div th:if="${flash}" class="animate-fade-in-up rounded-xl bg-brand-50 border border-brand-200 text-brand-800 px-4 py-3 text-sm flex items-start gap-2 shadow-soft">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span th:text="${flash}"></span>
    </div>
    <div th:if="${error}" class="animate-fade-in-up rounded-xl bg-red-50 border border-red-200 text-red-700 px-4 py-3 text-sm mt-2 flex items-start gap-2 shadow-soft">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span th:text="${error}"></span>
    </div>
</div>

<footer th:fragment="footer" class="mt-auto border-t border-slate-200 bg-white">
    <div class="max-w-6xl mx-auto px-4 py-8 grid sm:grid-cols-2 gap-4 text-xs text-slate-500">
        <div class="flex items-center gap-2">
            <span class="inline-flex w-7 h-7 items-center justify-center rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c-1.5 3-1.5 5 0 7"/><path d="M5 10c0 6 3 10 7 10s7-4 7-10c0-1-1-2-2-2H7c-1 0-2 1-2 2z"/></svg>
            </span>
            <span>&copy; Group-03 &mdash; Food Waste Management System</span>
        </div>
        <span class="sm:text-right">Donated food quality &amp; safety is the sole responsibility of the donating restaurant.</span>
    </div>
</footer>

</body>
</html>
