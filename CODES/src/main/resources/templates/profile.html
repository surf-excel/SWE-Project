<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('My profile')}"></head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<main class="flex-1">
    <div th:replace="~{fragments/layout :: flash}"></div>
    <div class="max-w-5xl mx-auto px-4 py-8 space-y-6 animate-fade-in-up">

        <div class="relative overflow-hidden rounded-2xl bg-gradient-to-br from-brand-600 via-brand-700 to-emerald-700 text-white p-6 md:p-8 shadow-soft">
            <div class="absolute -top-12 -right-12 w-56 h-56 rounded-full bg-white/10 blur-2xl"></div>
            <div class="relative flex items-center gap-5">
                <div class="relative">
                    <div class="w-20 h-20 rounded-2xl bg-white/15 backdrop-blur border border-white/30 flex items-center justify-center overflow-hidden">
                        <img th:if="${user.logoPath}" th:src="${user.logoPath}" alt="Logo" class="w-full h-full object-cover"/>
                        <span th:unless="${user.logoPath}" class="text-3xl font-extrabold" th:text="${#strings.toUpperCase(#strings.substring(user.fullName,0,1))}"></span>
                    </div>
                </div>
                <div>
                    <div class="text-brand-100 text-xs uppercase tracking-wider font-bold" th:text="${user.role}"></div>
                    <h1 class="text-2xl md:text-3xl font-extrabold" th:text="${user.fullName}"></h1>
                    <p class="text-brand-100 text-sm mt-0.5" th:text="${user.email}"></p>
                </div>
            </div>
        </div>

        <form th:action="@{/profile}" th:object="${form}" method="post" enctype="multipart/form-data"
              class="grid lg:grid-cols-2 gap-6">

            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-soft space-y-5">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Account details
                </h2>

                <div>
                    <label class="block text-sm font-semibold text-slate-700">Logo</label>
                    <div class="mt-2 flex items-center gap-4">
                        <div class="w-20 h-20 rounded-xl border border-slate-200 bg-slate-50 flex items-center justify-center overflow-hidden">
                            <img id="logoPreview" th:src="${user.logoPath}" th:if="${user.logoPath}" class="w-full h-full object-cover" alt="Current logo"/>
                            <svg th:unless="${user.logoPath}" id="logoPlaceholderIcon" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        </div>
                        <div class="flex-1">
                            <label for="logoInput" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50 cursor-pointer font-medium text-sm text-slate-700">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                Upload logo
                            </label>
                            <input id="logoInput" type="file" name="logo" accept="image/*" class="hidden" onchange="onLogoChange(this)"/>
                            <p class="text-xs text-slate-400 mt-1">JPG, PNG, GIF or WEBP &middot; up to 5 MB</p>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700">Name / Organization</label>
                    <input type="text" th:field="*{fullName}"
                           class="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2.5 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition"/>
                    <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700">Phone number</label>
                    <input type="text" th:field="*{phoneNumber}"
                           class="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2.5 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition"/>
                    <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700">Address</label>
                    <textarea th:field="*{address}" rows="2"
                              class="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2.5 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition"></textarea>
                    <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></p>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-soft space-y-4">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Location
                </h2>
                <p class="text-sm text-slate-500 -mt-2">Click on the map or search to set your location. Powered by OpenStreetMap.</p>

                <div class="flex flex-col sm:flex-row gap-2">
                    <input id="addrSearch" type="text" placeholder="Search address..."
                           class="flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 outline-none transition text-sm"/>
                    <button type="button" id="searchBtn"
                            class="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold text-sm">
                        Search
                    </button>
                    <button type="button" id="useGpsBtn"
                            class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-50 font-semibold text-sm flex items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
                        Use GPS
                    </button>
                </div>

                <div id="map" class="w-full h-72 rounded-xl border border-slate-200 z-0"></div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Latitude</label>
                        <input id="latInput" type="text" name="latitude" th:value="*{latitude}" readonly
                               class="mt-1 w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-mono"/>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Longitude</label>
                        <input id="lngInput" type="text" name="longitude" th:value="*{longitude}" readonly
                               class="mt-1 w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-mono"/>
                    </div>
                </div>
                <p id="mapStatus" class="text-xs text-slate-500 min-h-[1rem]"></p>
            </div>

            <div class="lg:col-span-2 flex justify-end gap-2">
                <a th:href="@{${user.role.name() == 'RESTAURANT'} ? '/restaurant' : '/orphanage'}"
                   class="px-5 py-2.5 rounded-lg border border-slate-300 hover:bg-slate-50 font-medium">Cancel</a>
                <button class="px-5 py-2.5 rounded-lg btn-primary">
                    Save profile
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const initialLat = /*[[${user.latitude}]]*/ null;
        const initialLng = /*[[${user.longitude}]]*/ null;
        const fallbackAddress = /*[[${user.address}]]*/ '';
        /*]]>*/

        const DEFAULT_CENTER = [23.8103, 90.4125];
        const startLatLng = (initialLat != null && initialLng != null)
            ? [initialLat, initialLng] : DEFAULT_CENTER;
        const startZoom = (initialLat != null && initialLng != null) ? 15 : 6;

        const latInput = document.getElementById('latInput');
        const lngInput = document.getElementById('lngInput');
        const status = document.getElementById('mapStatus');

        if (!latInput || !lngInput) {
            console.error('Profile map: latitude/longitude inputs not found in the DOM');
        }

        const map = L.map('map').setView(startLatLng, startZoom);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        let marker = null;

        function setMarker(lat, lng, opts = {}) {
            const ll = [lat, lng];
            if (!marker) {
                marker = L.marker(ll, { draggable: true }).addTo(map);
                marker.on('dragend', () => {
                    const p = marker.getLatLng();
                    updateInputs(p.lat, p.lng);
                });
            } else {
                marker.setLatLng(ll);
            }
            updateInputs(lat, lng);
            if (opts.fly !== false) map.setView(ll, Math.max(map.getZoom(), 15));
        }

        function updateInputs(lat, lng) {
            latInput.value = lat.toFixed(6);
            lngInput.value = lng.toFixed(6);
        }

        if (initialLat != null && initialLng != null) {
            setMarker(initialLat, initialLng, { fly: false });
        }

        map.on('click', e => setMarker(e.latlng.lat, e.latlng.lng, { fly: false }));

        async function geocode(q) {
            status.textContent = 'Searching...';
            try {
                const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q);
                const r = await fetch(url, { headers: { 'Accept-Language': 'en' } });
                const data = await r.json();
                if (data && data.length) {
                    const { lat, lon, display_name } = data[0];
                    setMarker(parseFloat(lat), parseFloat(lon));
                    status.textContent = 'Found: ' + display_name;
                } else {
                    status.textContent = 'No results for "' + q + '"';
                }
            } catch (err) {
                status.textContent = 'Search failed. Try again.';
            }
        }

        document.getElementById('searchBtn').addEventListener('click', () => {
            const q = document.getElementById('addrSearch').value.trim();
            if (q) geocode(q);
        });
        document.getElementById('addrSearch').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const q = e.target.value.trim();
                if (q) geocode(q);
            }
        });

        document.getElementById('useGpsBtn').addEventListener('click', () => {
            if (!navigator.geolocation) {
                status.textContent = 'GPS not available in this browser.';
                return;
            }
            status.textContent = 'Locating...';
            navigator.geolocation.getCurrentPosition(
                pos => { setMarker(pos.coords.latitude, pos.coords.longitude); status.textContent = 'Located.'; },
                () => { status.textContent = 'Could not get GPS location.'; }
            );
        });

        if (initialLat == null && fallbackAddress) {
            geocode(fallbackAddress);
        }

        function onLogoChange(input) {
            const file = input.files && input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('logoPreview');
                const icon = document.getElementById('logoPlaceholderIcon');
                if (img) {
                    img.src = e.target.result;
                } else {
                    const newImg = document.createElement('img');
                    newImg.id = 'logoPreview';
                    newImg.src = e.target.result;
                    newImg.className = 'w-full h-full object-cover';
                    if (icon) icon.replaceWith(newImg);
                }
                if (icon && icon.parentNode) icon.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    </script>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
